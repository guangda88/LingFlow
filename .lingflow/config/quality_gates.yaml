# LingFlow 质量门禁配置
# 基于 LingMinOpt 自优化结果（2026-04-01）

version: "1.0"
optimized_at: "2026-04-01T13:27:41"
optimization_framework: "LingMinOpt"

# 代码结构质量门禁
structure:
  enabled: true

  # 最佳参数配置（来自LingMinOpt优化）
  limits:
    max_class_size: 500
    max_method_count: 20
    max_complexity: 10
    max_nesting_depth: 4
    coupling_limit: 8.33

  # 质量基线
  baseline:
    violations: 17
    date: "2026-04-01"

  # 质量目标
  targets:
    violations: 10  # 下一步目标
    date: "2026-04-30"

  # 检查规则
  checks:
    - name: "class_size"
      enabled: true
      threshold: 500
      action: "warn"

    - name: "method_count"
      enabled: true
      threshold: 20
      action: "warn"

    - name: "complexity"
      enabled: true
      threshold: 10
      action: "fail"

    - name: "nesting_depth"
      enabled: true
      threshold: 4
      action: "warn"

    - name: "coupling"
      enabled: true
      threshold: 8.33
      action: "warn"

# 代码性能门禁
performance:
  enabled: true

  limits:
    execution_time_multiplier: 1.5  # 允许比基线慢50%
    memory_usage_mb: 500
    response_time_ms: 100

# 代码简洁性门禁
simplicity:
  enabled: true

  limits:
    complexity_threshold: 10
    duplication_penalty: 1.0
    max_line_length: 120

# 自动优化配置
auto_optimization:
  enabled: true

  # 触发条件
  triggers:
    on_commit: false
    on_review: true
    on_test: true
    on_schedule: true

  # 定期优化计划
  schedule:
    enabled: true
    frequency: "weekly"  # 每周运行一次
    day: "Monday"
    time: "02:00"  # 凌晨2点

  # 优化限制
  limits:
    max_experiments: 30
    time_budget: 600  # 10分钟
    early_stopping_patience: 10

# 报告配置
reporting:
  enabled: true

  output_dir: ".lingflow/reports"

  # 报告内容
  include:
    - optimization_summary
    - before_after_comparison
    - parameter_changes
    - improvement_metrics
    - recommendations

  # 报告格式
  formats:
    - json
    - markdown
    - html

# 集成配置
integration:
  # CI/CD集成
  ci_cd:
    enabled: true

    # 质量门禁
    quality_gate:
      enabled: true
      threshold: 20  # 超过20个违规则失败

    # 自动优化
    auto_optimize:
      enabled: false  # CI中暂时禁用，只在本地运行

  # IDE集成
  ide:
    enabled: true

    # 实时反馈
    realtime_feedback: true

    # 违规高亮
    highlight_violations: true

# 通知配置
notifications:
  enabled: false  # 暂时禁用

  channels:
    - type: "console"
      enabled: true

    - type: "file"
      enabled: true
      path: ".lingflow/logs/optimization.log"

    # - type: "email"
    #   enabled: false
    #   recipients: ["team@example.com"]

    # - type: "slack"
    #   enabled: false
    #   webhook: "https://hooks.slack.com/..."

# 持续改进计划
continuous_improvement:
  # 每周目标
  weekly:
    - run_self_optimization
    - review_violations
    - update_baseline

  # 每月目标
  monthly:
    - deep_refactor_top_violations
    - update_quality_gates
    - team_training

  # 每季度目标
  quarterly:
    - full_code_review
    - architecture_update
    - technology_stack_review
