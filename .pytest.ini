[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude external sub-project tests (they have their own test configs)
norecursedirs = lingflow-api lingflow-core lingflow-mcp-server mcp_server .git .benchmarks htmlcov site scripts/archive

# Output
addopts = -v --tb=short --strict-markers

# Coverage
markers =
    unit: Unit tests
    snapshot: Snapshot tests
    scenario: Scenario tests
    e2e: End-to-end tests
    ci: CI/CD integration tests
    slow: Slow running tests

# Parallel execution (requires pytest-xdist)
# Use -n auto to use all available CPU cores
# Use -n 4 to use 4 workers
# Default to parallel execution with auto detection
# addopts = -n auto --dist=loadscope --maxfail=5

# Fast-fail: stop after first N failures
# addopts = --maxfail=5

# Cache
cache_dir = .pytest_cache

# Asyncio support
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Pydantic V1 validator warnings
    ignore::pydantic.warnings.PydanticDeprecatedSince20
