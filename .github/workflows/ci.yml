name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Collect tests
      run: |
        python -m pytest --co -q
    - name: Run tests
      run: |
        python -m pytest -q --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy
    - name: Format check with black
      run: |
        black --check --line-length=127 lingflow/ tests/
    - name: Import check with isort
      run: |
        isort --check-only --profile black --line-length=127 lingflow/ tests/
    - name: Lint with flake8
      run: |
        flake8 --max-line-length=127 --max-complexity=15 --ignore=E203,E266,E501,W503,E402 lingflow/
    - name: Type check with mypy
      continue-on-error: true
      run: |
        mypy lingflow/ --ignore-missing-imports --python-version=3.11
