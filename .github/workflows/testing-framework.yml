name: Testing Framework CI

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'lingflow/testing/**'
      - '.github/workflows/testing-framework.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'lingflow/testing/**'
      - '.github/workflows/testing-framework.yml'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pydantic

      - name: Run unit tests
        run: |
          python -m pytest lingflow/testing/unit/ -v \
            --cov=lingflow/testing \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=unit-test-results.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unit-tests
          name: unit-tests-coverage

      - name: Archive coverage reports
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-unit
          path: htmlcov/

  snapshot-tests:
    name: Snapshot Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run snapshot tests
        run: |
          python -m pytest lingflow/testing/snapshot/ -v \
            --cov=lingflow/testing \
            --cov-append \
            --cov-report=xml \
            --junitxml=snapshot-test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: snapshot-tests
          name: snapshot-tests-coverage

  scenario-tests:
    name: Scenario Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run scenario tests
        run: |
          python -m pytest lingflow/testing/scenarios/ -v \
            --cov=lingflow/testing \
            --cov-append \
            --cov-report=xml \
            --junitxml=scenario-test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: scenario-tests
          name: scenario-tests-coverage

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio

      - name: Run e2e tests
        run: |
          python -m pytest lingflow/testing/e2e/ -v \
            --cov=lingflow/testing \
            --cov-append \
            --cov-report=xml \
            --junitxml=e2e-test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: e2e-tests
          name: e2e-tests-coverage

  test-performance:
    name: Test Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark

      - name: Run performance tests
        run: |
          python -m pytest lingflow/testing/ -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark-results.json

  test-coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, snapshot-tests, scenario-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run all tests with coverage
        run: |
          python -m pytest lingflow/testing/ -v \
            --cov=lingflow/testing \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=coverage-results.xml

      - name: Generate coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          coverage report >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: all-tests
          name: full-coverage

      - name: Archive coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-full
          path: htmlcov/

  test-report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, snapshot-tests, scenario-tests, e2e-tests]
    if: always()
    steps:
      - name: Download test results
        uses: actions/download-artifact@v3
        with:
          path: test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            test-results/**/unit-test-results.xml
            test-results/**/snapshot-test-results.xml
            test-results/**/scenario-test-results.xml
            test-results/**/e2e-test-results.xml
          check_name: Test Results

      - name: Create test summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests executed successfully!" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scanner
        run: |
          bandit -r lingflow/testing/ -f json -o bandit-report.json || true

      - name: Run Safety check
        run: |
          safety check --json > safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  parallel-tests:
    name: Parallel Tests (pytest-xdist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist pytest-cov

      - name: Run tests in parallel
        run: |
          python -m pytest lingflow/testing/ -n auto \
            --dist=loadscope \
            --cov=lingflow/testing \
            --cov-report=xml \
            --junitxml=parallel-test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: parallel-tests
          name: parallel-tests-coverage
