[tool.pytest]
ini_options =
    testpaths = tests
    python_files = test_*.py
    python_functions = test_*
    python_classes = Test*
    addopts =
        -v
        --strict-markers
        --disable-warnings
        --tb=short

[coverage:run]
source = app
omit =
    */tests/*
    */__init__.py
    */venv/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
