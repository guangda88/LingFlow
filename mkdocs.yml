# lingflow API Documentation
# 完整的工程流系统API参考

site_name: lingflow API Documentation
site_description: lingflow 工程流系统完整API文档 - 众智混元，万法灵通
site_author: lingflow Team
copyright: Copyright &copy; 2026 lingflow

# Repository
repo_name: guangda88/lingflow
repo_url: https://github.com/guangda88/lingflow

# Theme
theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search:
      lang:
        - zh
        - en
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_members_full_path: false
            show_object_full_path: false
            show_category_heading: true
            heading_level: 2
            inherited_members: true
            members_order: source
            separate_signature: true
            show_signature: true
            annotations_path: brief
            filters: ["!^_"]
  - gen-files:
      scripts:
        - docs/scripts/generate_api_docs.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - footnotes
  - meta

# Navigation
nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - API 参考:
    - lingflow: api/lingflow.md
    - coordination: api/coordination.md
    - workflow: api/workflow.md
    - context: api/context.md
    - compression: api/compression.md
    - self_optimizer: api/self_optimizer.md
    - phase4: api/phase4.md
    - phase5: api/phase5.md
  - 示例:
    - 基础用法: examples/basic_usage.md
    - 工作流定义: examples/workflow_definition.md
    - 自定义Agent: examples/custom_agent.md
    - 自优化配置: examples/self_optimization.md
  - 指南:
    - 架构概览: guides/architecture.md
    - Agent协调: guides/agent_coordination.md
    - 工作流引擎: guides/workflow_engine.md
    - 参数优化: guides/parameter_optimization.md
    - AI学习系统: guides/ai_learning.md

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Extra JS
extra_javascript:
  - javascripts/extra.js
