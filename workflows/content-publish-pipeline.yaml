name: 内容发布管线
description: 检查内容就绪→创建发布计划→调度灵扬执行→追踪发布状态

tasks:
  - id: check_readiness
    skill: publish-orchestrator
    params:
      action: check_readiness
      content_path: "{{params.content_path}}"
      content_type: "{{params.content_type | default('article')}}"
      platforms: "{{params.platforms | default([])}}"
      cover_path: "{{params.cover_path | default('')}}"
    metadata:
      stage: readiness
      priority: high

  - id: evaluate_readiness
    skill: conditional-branch
    params:
      condition: "{{tasks.check_readiness.output.ready}} == true"
      branches:
        true:
          - id: readiness_ok
            skill: notification
            params:
              level: "info"
              message: "内容就绪 (score={{tasks.check_readiness.output.readiness_score}}), 可发布平台: {{tasks.check_readiness.output.platforms_compatible | default('all')}}"
        false:
          - id: readiness_fail
            skill: notification
            params:
              level: "warning"
              message: "内容未就绪: {{tasks.check_readiness.output.issues}}"
            halt: true
    depends_on: [check_readiness]
    metadata:
      stage: gate
      priority: high

  - id: create_plan
    skill: publish-orchestrator
    params:
      action: create_plan
      content_path: "{{params.content_path}}"
      content_type: "{{params.content_type | default('article')}}"
      platforms: "{{params.platforms | default([])}}"
    depends_on: [evaluate_readiness]
    metadata:
      stage: planning
      priority: high

  - id: dispatch
    skill: publish-orchestrator
    params:
      action: dispatch
      content_path: "{{params.content_path}}"
      platforms: "{{params.platforms | default([])}}"
    depends_on: [create_plan]
    metadata:
      stage: dispatch
      priority: high

  - id: final_report
    skill: notification
    params:
      level: "info"
      message: |
        发布调度完成
        - 内容: {{params.content_path}}
        - 就绪分数: {{tasks.check_readiness.output.readiness_score}}
        - 自动发布: {{tasks.create_plan.output.can_auto_publish}}
        - 需人工: {{tasks.create_plan.output.requires_human}}
        - 调度指令已生成: {{tasks.dispatch.output.dispatch_message | default('待发送')}}
    depends_on: [dispatch]
    metadata:
      stage: reporting
      priority: low

success_criteria:
  - content_ready: true
  - plan_created: true
  - dispatch_generated: true

required_params:
  - content_path: 待发布内容路径

optional_params:
  - content_type: 内容类型 (article/podcast/video, 默认 article)
  - platforms: 目标平台列表 (dev_to/reddit/hackernews/wechat_mp/bilibili/ximalaya/xiaoyuzhou)
  - cover_path: 封面图路径
